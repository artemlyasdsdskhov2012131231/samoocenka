name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install -r requirements.txt
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p $HOME/.android
        echo "count=0" > $HOME/.android/repositories.cfg
        mkdir -p $ANDROID_HOME/licenses 2>/dev/null || true
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.android/android-sdk-license
        echo "d56f5187479451eab4c3364c1674101e5185f0ee" > $HOME/.android/android-sdk-preview-license
        echo "e4054a96b58076fb1a7309a5234df12e73b381b1" > $HOME/.android/google-gdk-license
        echo "33b6a2b64607f11724f6251c3ebf77060cde20cc" > $HOME/.android/mips-android-sysimage-license
    
    - name: Setup Android SDK tools
      run: |
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        
        echo "=== Finding sdkmanager ==="
        find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null || echo "sdkmanager not found in ANDROID_HOME"
        
        # Create directory structure
        mkdir -p $ANDROID_HOME/cmdline-tools/latest/bin
        mkdir -p $ANDROID_HOME/tools/bin
        
        # Find and copy sdkmanager from wherever it is
        SDKMANAGER_PATH=$(find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null | head -1)
        
        if [ -z "$SDKMANAGER_PATH" ]; then
          echo "ERROR: sdkmanager not found anywhere in $ANDROID_HOME"
          echo "=== Directory structure ==="
          find $ANDROID_HOME -type d | head -20
          exit 1
        fi
        
        echo "Found sdkmanager at: $SDKMANAGER_PATH"
        
        # Get the directory containing sdkmanager
        SDKMANAGER_DIR=$(dirname $SDKMANAGER_PATH)
        
        # Copy all binaries from that directory
        cp $SDKMANAGER_DIR/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
        cp $SDKMANAGER_DIR/avdmanager $ANDROID_HOME/tools/bin/avdmanager 2>/dev/null || true
        chmod +x $ANDROID_HOME/tools/bin/*
        
        # Verify
        if [ ! -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
          echo "ERROR: Failed to copy sdkmanager"
          exit 1
        fi
        
        echo "SUCCESS: sdkmanager copied to $ANDROID_HOME/tools/bin/sdkmanager"
        ls -la $ANDROID_HOME/tools/bin/
    
    - name: Build APK
      run: |
        cd ${{ github.workspace }}
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: samoocenka-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
