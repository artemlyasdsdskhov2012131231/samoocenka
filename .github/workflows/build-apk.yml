name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Set up Android SDK
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export ANDROID_HOME=/usr/local/lib/android/sdk
        
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        
        echo "Using system Android SDK"
        ls -la /usr/local/lib/android/sdk/ | head -15
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install -r requirements.txt
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/android-sdk-license
        echo "d56f5187479451eab4c3364c1674101e5185f0ee" > ~/.android/android-sdk-preview-license
        echo "e4054a96b58076fb1a7309a5234df12e73b381b1" > ~/.android/google-gdk-license
    
    - name: Build APK
      run: |
        cd ${{ github.workspace }}
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: samoocenka-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
